name: Debug

on:
  push:

jobs:
  apply:
    name: Test
    runs-on: ubuntu-24.04
    env:
      MISE_ENV: ci
    timeout-minutes: 10
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # https://github.com/jdx/mise-action
      - name: Install Mise dependencies
        uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2.1.11
        with:
          install_args: "terraform aqua:suzuki-shunsuke/tfcmt"

      - name: Extract SOPS secrets
        run: |
          mkdir -p ~/.config/mise
          echo "${{ secrets.SOPS_FILE }}" > ~/.config/mise/flutterkaigi.txt

      # - name: Extract backend.tfbackend
      #   run: |
      #     echo ${{ secrets.TERRAFORM_BACKEND_CONFIGURATION }} | base64 -d  \
      #       > backend.tfbackend

      # - name: Terraform init
      #   id: init
      #   run: terraform init -backend-config=backend.tfbackend

      - name: Test
        run: |
          echo "TF_VAR_SUPABASE_DB_PASSWORD_STAGING"
          echo $TF_VAR_SUPABASE_DB_PASSWORD_STAGING | md5sum
          echo "TF_VAR_SUPABASE_ORGANIZATION_ID"
          echo $TF_VAR_SUPABASE_ORGANIZATION_ID | md5sum
          echo "CLOUDFLARE_ACCOUNT_ID"
          echo $CLOUDFLARE_ACCOUNT_ID | md5sum

      - name: Test with mise exec
        run: |
          echo "TF_VAR_SUPABASE_DB_PASSWORD_STAGING"
          mise exec -- echo $TF_VAR_SUPABASE_DB_PASSWORD_STAGING | md5sum
          echo "TF_VAR_SUPABASE_ORGANIZATION_ID"
          mise exec -- echo $TF_VAR_SUPABASE_ORGANIZATION_ID | md5sum
          echo "CLOUDFLARE_ACCOUNT_ID"
          mise exec -- echo $CLOUDFLARE_ACCOUNT_ID | md5sum

      - name: Test with node
        run: |
          mise exec -- node --eval 'console.log(process.env.TF_VAR_SUPABASE_DB_PASSWORD_STAGING)'
          mise exec -- node --eval 'console.log(process.env.TF_VAR_SUPABASE_ORGANIZATION_ID)'
          mise exec -- node --eval 'console.log(process.env.CLOUDFLARE_ACCOUNT_ID)'

      - name: Mise Env
        run: |
          mise env

      # - name: Terraform apply
      #   id: apply
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: tfcmt apply -var "target:${{ matrix.target }}" -- terraform apply --auto-approve
